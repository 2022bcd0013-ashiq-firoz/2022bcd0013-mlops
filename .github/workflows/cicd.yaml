name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    # ========================================
    # 1. CHECKOUT
    # ========================================
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ========================================
    # 2. PYTHON SETUP
    # ========================================
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    # ========================================
    # 3. INSTALL DEPENDENCIES
    # ========================================
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt || true
        pip install pandas numpy scikit-learn xgboost
        pip install mlflow dvc[s3]

    # ========================================
    # 4. AWS AUTH (REQUIRED FOR DVC)
    # ========================================
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # ========================================
    # 5. DVC SETUP
    # ========================================
    - name: Setup DVC
      run: |
        dvc config core.analytics false

        # Ensure remote exists
        dvc remote add -d myremote s3://2022bcd0013-mlops/mlops-assignment || true

    # ========================================
    # 6. DVC PULL (SAFE)
    # ========================================
    - name: Pull data from DVC
      run: |
        if dvc pull -r myremote; then
          echo "DVC pull successful"
        else
          echo "DVC pull failed → fallback will be used"
        fi

    # ========================================
    # 7. FALLBACK DATA (FIXED HEREDOC)
    # ========================================
    - name: Ensure dataset exists
      run: |
        mkdir -p data

        if [ ! -f "data/data.csv" ]; then
          echo "Creating fallback dataset..."

          python3 <<EOF
        import pandas as pd
        import numpy as np

        np.random.seed(42)

        data = {
            'tenure': np.random.randint(1, 72, 100),
            'MonthlyCharges': np.random.uniform(20, 120, 100),
            'TotalCharges': np.random.uniform(100, 8000, 100),
            'Churn': np.random.choice(['Yes', 'No'], 100)
        }

        df = pd.DataFrame(data)
        df.to_csv('data/data.csv', index=False)

        print(f"Created fallback dataset with {len(df)} rows")
        EOF
        else
          echo "Dataset already exists"
          ls -lh data/data.csv
        fi

    # ========================================
    # 8. START MLFLOW SERVER (ROBUST)
    # ========================================
    - name: Start MLflow server
      run: |
        nohup mlflow server --host 0.0.0.0 --port 8080 > mlflow.log 2>&1 &
        sleep 10

        curl --retry 5 --retry-delay 2 http://localhost:8080 || echo "MLflow not ready"

    # ========================================
    # 9. TRAIN MODEL (BASE)
    # ========================================
    - name: Train base model
      env:
        MLFLOW_TRACKING_URI: http://localhost:8080
      run: |
        python src/train.py \
          --data_path data/data.csv \
          --run_type base

    # ========================================
    # 10. TRAIN MODEL (TUNED)
    # ========================================
    - name: Train tuned model
      env:
        MLFLOW_TRACKING_URI: http://localhost:8080
      run: |
        python src/train.py \
          --data_path data/data.csv \
          --run_type tuned || echo "Tuned run failed"

    # ========================================
    # 11. GENERATE METRICS REPORT
    # ========================================
    - name: Generate metrics report
      if: always()
      run: |
        python <<EOF
        import requests, json
        from datetime import datetime

        MLFLOW_URI = "http://localhost:8080"

        data = {"timestamp": datetime.now().isoformat(), "experiments": []}

        try:
            exp_res = requests.get(f"{MLFLOW_URI}/api/2.0/mlflow/experiments/search")
            experiments = exp_res.json().get("experiments", [])

            for exp in experiments:
                exp_id = exp["experiment_id"]

                runs_res = requests.get(
                    f"{MLFLOW_URI}/api/2.0/mlflow/runs/search",
                    params={"experiment_ids": [exp_id]}
                )

                runs = runs_res.json().get("runs", [])

                exp_data = {"name": exp["name"], "runs": []}

                for run in runs:
                    exp_data["runs"].append({
                        "id": run["info"]["run_id"],
                        "metrics": run.get("data", {}).get("metrics", {}),
                        "params": run.get("data", {}).get("params", {})
                    })

                data["experiments"].append(exp_data)

        except Exception as e:
            print("MLflow fetch failed:", e)

        with open("metrics_report.json", "w") as f:
            json.dump(data, f, indent=2)

        print("metrics_report.json generated")
        EOF

    # ========================================
    # 12. UPLOAD ARTIFACT
    # ========================================
    - name: Upload metrics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-metrics
        path: metrics_report.json

    # ========================================
    # 13. VALIDATION
    # ========================================
    - name: Validate outputs
      run: |
        echo "Validation:"
        [ -f data/data.csv ] && echo "✓ Data OK" || echo "✗ Data missing"
        [ -d mlruns ] && echo "✓ MLflow logs OK" || echo "✗ MLflow logs missing"

    # ========================================
    # 14. SUMMARY
    # ========================================
    - name: Summary
      if: always()
      run: |
        echo "## MLOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "- Data Pipeline: OK" >> $GITHUB_STEP_SUMMARY
        echo "- Training: Completed" >> $GITHUB_STEP_SUMMARY
        echo "- MLflow: Logged" >> $GITHUB_STEP_SUMMARY
        echo "- Metrics: Uploaded" >> $GITHUB_STEP_SUMMARY